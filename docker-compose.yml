services:
  postgres:
    image: postgres:16-alpine
    container_name: sg_postgres
    environment:
      POSTGRES_DB: sistema_gerencial
      POSTGRES_USER: sg_user
      POSTGRES_PASSWORD: sg_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sg_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: